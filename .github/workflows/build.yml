name: Build APK

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build APK
        run: |
          PROFILE="${{ github.event.inputs.profile || 'preview' }}"
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            PROFILE="production"
          fi
          eas build --platform android --profile "$PROFILE" --non-interactive --wait

      - name: Download APK from EAS
        run: |
          BUILD_ID=$(eas build:list --platform android --profile preview --limit 1 --json | jq -r '.[0].id')
          eas build:download "$BUILD_ID" --output app-release.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app-release.apk

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download built APK
        uses: actions/download-artifact@v4
        with:
          name: app-release

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: app-release.apk
          generate_release_notes: true
